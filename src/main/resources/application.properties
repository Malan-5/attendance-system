# Application Configuration
spring.application.name=attendance-system
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/attendance_system?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=malaN@2007
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.smartclassroom=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JSON Configuration
spring.jackson.serialization.indent_output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# OpenAI Configuration
# Provide the OpenAI API key via an environment variable named OPENAI_API_KEY for security.
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo
openai.temperature=0.7
openai.max-tokens=500